name: continuous integration

on:
  push:
    branches: 
      - main 
    tags:
      - "*.*.*"  # Any tag that looks like a version
  pull_request:
    branches: 
      - main

jobs:
  test:
    runs-on: self-hosted
    container: fmri.science/halfpipe:latest
    steps:
      - name: Install dependencies
        shell: sudo bash {0}
        run: |
          apt-get --yes update
          apt-get --yes install libreoffice git zip

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build atlases
        id: build_atlases
        shell: bash
        run: |
          cat > "${FREESURFER_HOME}/license.txt" <<EOF
          halfpipe@fmri.science
          73053
           *C8FMo8yrzcZA
           FSCA7.lDgNIow
           e1n3o06osRFD3qtBRgsTy9f9bQHGOpY/riIUrHoEx5c=
          EOF

          pip install --verbose .

          atlas_dir=/tmp/atlases
          mkdir -p ${atlas_dir}
          pushd ${atlas_dir} || exit

          halfpipe-atlases-build
          
          zip_path=${atlas_dir}.zip
          zip ${zip_path} *

          echo "zip_path=${zip_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload atlases
        uses: actions/upload-artifact@v3
        with:
          name: atlases.zip
          path: ${{ steps.build_atlases.outputs.zip_path }}

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.build_atlases.outputs.zip_path }}
