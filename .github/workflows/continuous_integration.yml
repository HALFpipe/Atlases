name: continuous integration

on:
  push:
    branches: 
      - main 
    tags:
      - "*.*.*"  # Any tag that looks like a version
  pull_request:
    branches: 
      - main

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup container
        run: |
          docker run \
            --detach \
            --rm \
            --name="build" \
            --volume="/home/runner:/home/runner" \
            --volume="$(pwd):/halfpipe" \
            --workdir="/halfpipe" \
            --entrypoint="tail" \
            ${{ secrets.REGISTRY }}/halfpipe:latest \
            --follow /dev/null

      - name: Install dependencies
        shell: docker exec build bash -x -e {0}
        run: |
          export LD_LIBRARY_PATH=""
          rm --force /etc/apt/sources.list.d/zeehio.list
          apt-get --yes update
          apt-get --yes install libreoffice git zip

      - name: Build atlases
        shell: docker exec build bash -x -e {0}
        run: |
          cat > "${FREESURFER_HOME}/license.txt" <<EOF
          halfpipe@fmri.science
          73053
          *C8FMo8yrzcZA
          FSCA7.lDgNIow
          e1n3o06osRFD3qtBRgsTy9f9bQHGOpY/riIUrHoEx5c=
          EOF

          pip install --verbose .

          atlas_path=$(mktemp -d)
          pushd "${atlas_path}" || exit

          halfpipe-atlases-build

          popd || exit

          zip -9 --junk-paths --recurse-paths atlases.zip "${atlas_path}"

      - name: Stop container
        run: |
          docker kill build

      - name: Upload atlases
        uses: actions/upload-artifact@v4
        with:
          path: atlases.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: atlases.zip
